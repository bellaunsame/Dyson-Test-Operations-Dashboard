{% extends 'base.html' %}

{% block title %}Dashboard - Dyson Operations Dashboard{% endblock %}

{% block content %}

<!-- DASHBOARD GRID -->
<div class="dashboard-grid">
    <!-- GANTT CHART CARD -->
    <div class="grid-card gantt-card">
        <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
            <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                <div style="display: flex; align-items: center; gap: 6px;">
                    <span style="font-size: 20px;">📊</span>
                    <h2 style="margin: 0; font-size: 18px; font-weight: 700; color: var(--color-text);">Project Gantt Timeline</h2>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <label for="project-select" style="font-size: 13px; font-weight: 600; color: var(--color-text-muted);">Project:</label>
                    <select id="project-select" style="padding: 6px 12px; border-radius: 6px; border: 1px solid var(--color-border); background-color: var(--color-card-bg); color: var(--color-text); font-size: 13px; font-weight: 600; cursor: pointer; outline: none; min-width: 100px;">
                        <!-- Populated dynamically -->
                    </select>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <label for="category-select" style="font-size: 13px; font-weight: 600; color: var(--color-text-muted);">Category:</label>
                    <select id="category-select" style="padding: 6px 12px; border-radius: 6px; border: 1px solid var(--color-border); background-color: var(--color-card-bg); color: var(--color-text); font-size: 13px; font-weight: 600; cursor: pointer; outline: none; min-width: 140px;">
                        <option value="all">All Categories</option>
                    </select>
                </div>
                <button class="btn btn-secondary" id="btn-refresh-gantt" style="padding: 6px 12px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px;">
                    <i class="fa-solid fa-arrows-rotate"></i> Refresh
                </button>
            </div>
            <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                <!-- Phase Legend -->
                <div id="gantt-legend" style="display: flex; align-items: center; gap: 10px; font-size: 11px; font-weight: 600;">
                    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#8E44AD;display:inline-block;"></span>Proto</span>
                    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#2980B9;display:inline-block;"></span>DVT</span>
                    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#27AE60;display:inline-block;"></span>EVT</span>
                    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#D35400;display:inline-block;"></span>PVT</span>
                    <span style="display:flex;align-items:center;gap:4px;"><span style="width:2px;height:12px;background:#ff3b30;display:inline-block;border-radius:1px;"></span>Today</span>
                </div>
                <!-- Scale buttons -->
                <div class="gantt-scale-buttons" style="display: flex; align-items: center; gap: 6px;">
                    <span style="font-size: 12px; font-weight: 600; color: var(--color-text-muted); margin-right: 4px;">View:</span>
                    <button class="btn btn-secondary btn-scale active" data-scale="day" style="padding: 6px 12px; font-size: 12px; font-weight: 600; border-radius: 4px;">Day</button>
                    <button class="btn btn-secondary btn-scale" data-scale="week" style="padding: 6px 12px; font-size: 12px; font-weight: 600; border-radius: 4px;">Week</button>
                    <button class="btn btn-secondary btn-scale" data-scale="month" style="padding: 6px 12px; font-size: 12px; font-weight: 600; border-radius: 4px;">Month</button>
                </div>
            </div>
        </div>

        <!-- Summary stats row -->
        <div id="gantt-summary" style="display: flex; gap: 16px; padding: 10px 0 4px; flex-wrap: wrap; border-bottom: 1px solid var(--color-border); margin-bottom: 4px;">
            <span id="gantt-stat-bars" style="font-size: 11px; color: var(--color-text-muted);"></span>
            <span id="gantt-stat-span" style="font-size: 11px; color: var(--color-text-muted);"></span>
            <span id="gantt-stat-today" style="font-size: 11px; color: #ff3b30; font-weight: 600;"></span>
        </div>

        <!-- Scrollable chart wrapper -->
        <div id="gantt-chart-scroll" class="card-body" style="overflow-y: auto; overflow-x: hidden; padding: 0;">
            <div id="gantt-chart-wrapper" style="position: relative; min-height: 300px;">
                <canvas id="ganttChart"></canvas>
            </div>
        </div>
    </div>
</div>
{% endblock %}
