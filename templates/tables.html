{% extends "base.html" %}

{% block title %}Project — Test Ops Dashboard{% endblock %}

{% block content %}
<div class="container-fluid" style="padding: 20px; max-width: 1200px; margin: 0 auto;">
    <!-- Page Header -->
    <header class="page-header" style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; flex-wrap: wrap; gap: 15px;">
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <a href="/dashboard" class="back-link" style="font-size: 14px; font-weight: 600; color: var(--color-text-muted); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s;">
                <i class="fa-solid fa-arrow-left"></i> Dashboard
            </a>
            <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 24px;">📋</span>
                <h1 style="margin: 0; font-size: 24px; font-weight: 700; color: var(--color-text);">Project</h1>
            </div>
        </div>
        <button class="btn btn-primary" id="btn-create-project" style="padding: 8px 16px; font-weight: 600;">
            <i class="fa-solid fa-plus"></i> Create Project
        </button>
    </header>

    <!-- Controls Row -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px;">
        <!-- Active/Archived Toggles -->
        <div class="toggle-group" style="display: flex; background: var(--color-border); padding: 4px; border-radius: 6px; gap: 4px;">
            <button class="toggle-btn active" id="toggle-active" style="padding: 6px 16px; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; background: var(--color-card-bg); color: var(--color-text);">Active</button>
            <button class="toggle-btn" id="toggle-archived" style="padding: 6px 16px; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: var(--color-text-muted);">Archived</button>
        </div>

        <!-- Search Bar -->
        <div style="display: flex; gap: 8px; width: 100%; max-width: 300px;">
            <input type="text" id="search-projects" placeholder="Search projects..." style="flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--color-border); background: var(--color-card-bg); color: var(--color-text); font-size: 13px; outline: none;">
            <button class="btn btn-secondary" style="padding: 8px 12px; border-radius: 6px; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </div>

    <!-- Project Cards Grid -->
    <div class="project-grid" id="project-cards-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px;">
        <!-- Loaded dynamically via JavaScript -->
        <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--color-text-muted);">
            <i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>Loading projects...
        </div>
    </div>

    <!-- Footer / Pagination -->
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; border-top: 1px solid var(--color-border); padding-top: 20px;">
        <span id="showing-count" style="font-size: 13px; color: var(--color-text-muted);">Showing 0-0 of 0</span>
        <div class="pagination" style="display: flex; gap: 6px;">
            <button class="btn btn-secondary" id="btn-prev" style="padding: 6px 12px; font-size: 12px; font-weight: 600;" disabled>◀ Prev</button>
            <button class="btn btn-primary" id="btn-page-num" style="padding: 6px 12px; font-size: 12px; font-weight: 600;">1</button>
            <button class="btn btn-secondary" id="btn-next" style="padding: 6px 12px; font-size: 12px; font-weight: 600;" disabled>Next ▶</button>
        </div>
    </div>
</div>

<!-- Create Project Modal -->
<div class="modal-backdrop" id="create-project-modal">
    <div class="modal-card" style="width: 100%; max-width: 400px; margin-top: auto; margin-bottom: auto;">
        <div class="modal-header">
            <h3 style="margin: 0; font-size: 18px; font-weight: 700; color: var(--color-text);">Create New Project</h3>
            <button class="modal-close-btn" id="btn-close-project-modal-x" type="button"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding: 20px 0 0 0;">
            <form id="create-project-form">
                <div style="margin-bottom: 15px;">
                    <label for="new-project-name" style="display: block; font-size: 12px; font-weight: 600; color: var(--color-text-muted); margin-bottom: 6px;">Project Name</label>
                    <input type="text" id="new-project-name" placeholder="e.g., 990" required style="width: 100%; padding: 8px 12px; border-radius: 6px;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label for="new-project-desc" style="display: block; font-size: 12px; font-weight: 600; color: var(--color-text-muted); margin-bottom: 6px;">Description / Notes</label>
                    <input type="text" id="new-project-desc" placeholder="e.g., Initial integration tests" style="width: 100%; padding: 8px 12px; border-radius: 6px;">
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" class="btn btn-secondary" id="btn-close-project-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    let activeTab = 'Active';
    let searchQuery = '';
    let projectsData = [];

    const cardsContainer = document.getElementById('project-cards-container');
    const toggleActive = document.getElementById('toggle-active');
    const toggleArchived = document.getElementById('toggle-archived');
    const searchInput = document.getElementById('search-projects');
    const showingCount = document.getElementById('showing-count');
    
    // Create Modal controls
    const createModal = document.getElementById('create-project-modal');
    const btnCreate = document.getElementById('btn-create-project');
    const btnCloseModal = document.getElementById('btn-close-project-modal');
    const btnCloseModalX = document.getElementById('btn-close-project-modal-x');
    const createForm = document.getElementById('create-project-form');

    // Tab toggling
    toggleActive.addEventListener('click', () => {
        activeTab = 'Active';
        toggleActive.classList.add('active');
        toggleActive.style.background = 'var(--color-card-bg)';
        toggleActive.style.color = 'var(--color-text)';
        toggleArchived.classList.remove('active');
        toggleArchived.style.background = 'transparent';
        toggleArchived.style.color = 'var(--color-text-muted)';
        currentPage = 1;
        loadProjects();
    });

    toggleArchived.addEventListener('click', () => {
        activeTab = 'Archived';
        toggleArchived.classList.add('active');
        toggleArchived.style.background = 'var(--color-card-bg)';
        toggleArchived.style.color = 'var(--color-text)';
        toggleActive.classList.remove('active');
        toggleActive.style.background = 'transparent';
        toggleActive.style.color = 'var(--color-text-muted)';
        currentPage = 1;
        loadProjects();
    });

    // Search
    searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase().trim();
        currentPage = 1;
        loadProjects();
    });

    // Create Modal show/hide
    btnCreate.addEventListener('click', () => createModal.classList.add('active'));
    
    function closeProjectModal() {
        createModal.classList.remove('active');
        createForm.reset();
    }

    if (btnCloseModal) btnCloseModal.addEventListener('click', closeProjectModal);
    if (btnCloseModalX) btnCloseModalX.addEventListener('click', closeProjectModal);

    // Create Project submit
    createForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('new-project-name').value.trim();
        const description = document.getElementById('new-project-desc').value.trim();

        fetch('/api/projects', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, description })
        })
        .then(res => {
            if (!res.ok) return res.json().then(d => { throw new Error(d.error); });
            return res.json();
        })
        .then(data => {
            showToast(`Project ${data.name} created successfully!`, 'success');
            closeProjectModal();
            loadProjects();
        })
        .catch(err => showToast(err.message, 'error'));
    });

    // Load Projects
    let totalItemsCount = 0;
    function loadProjects() {
        fetch(`/api/projects?status=${activeTab}`)
            .then(res => res.json())
            .then(projects => {
                projectsData = projects;
                // Filter by search
                const filtered = projects.filter(p => (p.name || '').toLowerCase().includes(searchQuery) || (p.description || '').toLowerCase().includes(searchQuery));
                totalItemsCount = filtered.length;
                const totalPages = Math.max(1, Math.ceil(totalItemsCount / pageSize));
                if (currentPage > totalPages) currentPage = totalPages;
                renderProjects(filtered, totalItemsCount);
            })
            .catch(err => {
                console.error(err);
                showToast('Error loading projects', 'error');
            });
    }

    function renderProjects(projects, totalCount) {
        cardsContainer.innerHTML = '';
        // Calculate pagination slice
        const startIndex = (currentPage - 1) * pageSize;
        const pageItems = projects.slice(startIndex, startIndex + pageSize);
        if (totalCount === 0) {
            showingCount.textContent = `Showing 0-0 of 0`;
            cardsContainer.innerHTML = `
                <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--color-text-muted);">
                    No projects found. Click "Create Project" above to add one.
                </div>
            `;
            updatePaginationControls(totalCount);
            return;
        }

        showingCount.textContent = `Showing ${startIndex + 1}-${startIndex + pageItems.length} of ${totalCount}`;

        if (pageItems.length === 0) {
            cardsContainer.innerHTML = `
                <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--color-text-muted);">
                    No projects found. Click "Create Project" above to add one.
                </div>
            `;
            updatePaginationControls(totalCount);
            return;
        }

        pageItems.forEach(p => {
            const card = document.createElement('div');
            card.className = 'grid-card';
            card.style.padding = '20px';
            card.style.position = 'relative';
            card.style.display = 'flex';
            card.style.flexDirection = 'column';
            card.style.justifyContent = 'space-between';
            card.style.minHeight = '180px';
            card.style.cursor = 'pointer';
            card.style.border = '1px solid var(--color-border)';
            card.style.borderRadius = '8px';
            card.style.background = 'var(--color-card-bg)';
            card.style.transition = 'transform 0.2s, border-color 0.2s';
            
            // Hover effect
            card.addEventListener('mouseenter', () => {
                card.style.transform = 'translateY(-2px)';
                card.style.borderColor = 'var(--color-primary)';
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'none';
                card.style.borderColor = 'var(--color-border)';
            });

            // Click card to navigate (excluding buttons)
            card.addEventListener('click', (e) => {
                if (e.target.closest('.card-action-btn')) return;
                window.location.href = `/tables/${p.name}`;
            });

            const rowText = p.row_count === 1 ? '1 row' : `${p.row_count} rows`;

            card.innerHTML = `
                <div>
                    <!-- Header Icon & Name -->
                    <div style="display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px;">
                        <span style="font-size: 24px; padding: 4px; background: rgba(255,255,255,0.03); border-radius: 4px;">📝</span>
                        <div>
                            <h3 style="margin: 0; font-size: 16px; font-weight: 700; color: var(--color-text);">${p.name}</h3>
                            <p style="margin: 4px 0 0 0; font-size: 12px; color: var(--color-text-muted); min-height: 16px;">${p.description || ''}</p>
                        </div>
                    </div>
                    
                    <!-- Metadata Badges -->
                    <div style="display: flex; gap: 8px; margin-bottom: 20px; align-items: center; flex-wrap: wrap;">
                        <span style="background: rgba(0,83,156,0.15); color: #70b3f5; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px;">${rowText}</span>
                        <span style="font-size: 11px; color: var(--color-text-muted);">Created ${p.created_at}</span>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div style="display: flex; gap: 8px; border-top: 1px solid var(--color-border); padding-top: 12px;">
                    <button class="btn btn-secondary card-action-btn btn-archive" data-name="${p.name}" style="flex: 1; padding: 6px; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 4px;">
                        <i class="fa-solid fa-box-archive"></i> ${p.status === 'Active' ? 'Archive' : 'Activate'}
                    </button>
                    <button class="btn btn-secondary card-action-btn btn-delete text-red" data-name="${p.name}" style="padding: 6px 10px; border-color: rgba(231,76,60,0.2); background: rgba(231,76,60,0.05); color: #e74c3c;">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            `;

            // Attach Archive Handler
            card.querySelector('.btn-archive').addEventListener('click', (e) => {
                const name = e.currentTarget.getAttribute('data-name');
                const nextStatus = p.status === 'Active' ? 'Archived' : 'Active';
                updateProjectStatus(name, nextStatus);
            });

            // Attach Delete Handler
            card.querySelector('.btn-delete').addEventListener('click', (e) => {
                const name = e.currentTarget.getAttribute('data-name');
                if (confirm(`Are you sure you want to delete project ${name}? All associated test records will be permanently deleted.`)) {
                    deleteProject(name);
                }
            });

            cardsContainer.appendChild(card);
        });

        updatePaginationControls(totalCount);
    }

    function updateProjectStatus(name, status) {
        fetch(`/api/projects/${name}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status })
        })
        .then(res => res.json())
        .then(() => {
            showToast(`Project ${status === 'Active' ? 'activated' : 'archived'}!`, 'success');
            loadProjects();
        })
        .catch(err => showToast('Failed to update project status', 'error'));
    }

    function deleteProject(name) {
        fetch(`/api/projects/${name}`, {
            method: 'DELETE'
        })
        .then(res => res.json())
        .then(data => {
            showToast(data.message, 'success');
            loadProjects();
        })
        .catch(err => showToast('Failed to delete project', 'error'));
    }

    // Pagination state
    let currentPage = 1;
    const pageSize = 9; // projects per page (grid cards)
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnPageNum = document.getElementById('btn-page-num');

    btnPrev.addEventListener('click', () => {
        console.debug('Prev clicked', { currentPage, totalItemsCount, pageSize });
        if (!btnPrev || !btnNext) return console.debug('Pagination buttons missing');
        const totalPages = Math.max(1, Math.ceil(totalItemsCount / pageSize));
        if (currentPage > 1) {
            currentPage -= 1;
            loadProjects();
        } else {
            btnPrev.disabled = true;
        }
    });

    btnNext.addEventListener('click', () => {
        console.debug('Next clicked', { currentPage, totalItemsCount, pageSize });
        if (!btnPrev || !btnNext) return console.debug('Pagination buttons missing');
        const totalPages = Math.max(1, Math.ceil(totalItemsCount / pageSize));
        if (currentPage < totalPages) {
            currentPage += 1;
            loadProjects();
        } else {
            btnNext.disabled = true;
        }
    });

    function updatePaginationControls(totalItems) {
        const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
        btnPageNum.textContent = String(currentPage);
        btnPrev.disabled = currentPage <= 1;
        btnNext.disabled = currentPage >= totalPages;
    }

    // Initial load
    loadProjects();
});
</script>
{% endblock %}
